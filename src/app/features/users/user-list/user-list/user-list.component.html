<!-- features/users/user-list/user-list.component.html -->
<div class="user-list-container">

  <p-toast />
  <p-confirmDialog />

  <div class="page-header">
    <h2>User Management</h2>
    <p-button
      label="Add User"
      icon="pi pi-plus"
      (onClick)="navigateToCreate()" />
  </div>
  

  <p-table
    [value]="users()"
    [loading]="loading()"
    [paginator]="true"
    [rows]="10"
    [showCurrentPageReport]="true"
    [rowsPerPageOptions]="[10, 25, 50]"
    [globalFilterFields]="['firstName','lastName','email']"
    styleClass="p-datatable-striped p-datatable-gridlines">

    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="id">ID <p-sortIcon field="id"/></th>
        <th pSortableColumn="firstName">First Name <p-sortIcon field="firstName"/></th>
        <th pSortableColumn="lastName">Last Name <p-sortIcon field="lastName"/></th>
        <th pSortableColumn="email">Email <p-sortIcon field="email"/></th>
        <th>Phone</th>
        <th pSortableColumn="role">Role <p-sortIcon field="role"/></th>
        <th pSortableColumn="status">Status <p-sortIcon field="status"/></th>
        <th>Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-user>
      <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.firstName }}</td>
        <td>{{ user.lastName }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.phone }}</td>
        <td>
          <p-tag [value]="user.role" severity="info" />
        </td>
        <td>
          <p-tag
            [value]="user.status"
            [severity]="getStatusSeverity(user.status)" />
        </td>
        <td>
          <p-button
            icon="pi pi-pencil"
            [rounded]="true"
            [text]="true"
            severity="info"
            (onClick)="navigateToEdit(user)" />
          <p-button
            icon="pi pi-trash"
            [rounded]="true"  
            [text]="true"
            severity="danger"
            (onClick)="confirmDelete(user)" />
            <p-button 
            icon="pi pi-eye" 
            [rounded]="true" 
            [text]="true" 
            severity="success" 
            (onClick)="navigateToDetail(user)" />
            
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="8" class="text-center">No users found.</td>
      </tr>
    </ng-template>

  </p-table>

</div>
