<!-- features/products/product-form/product-form.component.html -->
<div class="product-form-container">
  <p-toast />

  <p-card>
    <ng-template pTemplate="title">
      <div class="form-header">
        <i class="pi pi-box" style="font-size: 1.5rem;"></i>
        <span>{{ isEditMode ? 'Edit Product' : 'Create New Product' }}</span>
      </div>
    </ng-template>

    <ng-template pTemplate="content">
      <form [formGroup]="productForm" (ngSubmit)="onSubmit()">

        <div class="form-grid">

          <!-- Name -->
          <div class="field full-width">
            <label for="name">Product Name <span class="required">*</span></label>
            <input
              pInputText
              id="name"
              formControlName="name"
              placeholder="Enter product name"
              fluid />
            <small class="error-msg"
              *ngIf="productForm.get('name')?.invalid && productForm.get('name')?.touched">
              <span *ngIf="productForm.get('name')?.errors?.['required']">Name is required</span>
              <span *ngIf="productForm.get('name')?.errors?.['minlength']">Minimum 2 characters</span>
            </small>
          </div>

          <!-- Description -->
          <div class="field full-width">
            <label for="description">Description</label>
            <textarea
              pTextarea
              id="description"
              formControlName="description"
              placeholder="Enter product description"
              [rows]="3"
              fluid></textarea>
          </div>

          <!-- Price -->
          <div class="field">
            <label for="price">Price <span class="required">*</span></label>
            <p-inputnumber
              id="price"
              formControlName="price"
              mode="currency"
              currency="INR"
              locale="en-IN"
              placeholder="Enter price"
              fluid />
            <small class="error-msg"
              *ngIf="productForm.get('price')?.invalid && productForm.get('price')?.touched">
              Valid price is required
            </small>
          </div>

          <!-- Stock -->
          <div class="field">
            <label for="stock">Stock <span class="required">*</span></label>
            <p-inputnumber
              id="stock"
              formControlName="stock"
              placeholder="Enter stock quantity"
              [min]="0"
              fluid />
            <small class="error-msg"
              *ngIf="productForm.get('stock')?.invalid && productForm.get('stock')?.touched">
              Stock is required
            </small>
          </div>

          <!-- Category -->
          <div class="field">
            <label for="category">Category <span class="required">*</span></label>
            <p-select
              id="category"
              formControlName="category"
              [options]="categoryOptions"
              optionLabel="label"
              optionValue="value"
              placeholder="Select category"
              fluid />
            <small class="error-msg"
              *ngIf="productForm.get('category')?.invalid && productForm.get('category')?.touched">
              Category is required
            </small>
          </div>

          <!-- Status -->
          <div class="field">
            <label for="status">Status <span class="required">*</span></label>
            <p-select
              id="status"
              formControlName="status"
              [options]="statusOptions"
              optionLabel="label"
              optionValue="value"
              placeholder="Select status"
              fluid />
          </div>

          <!-- Image URL -->
          <div class="field full-width">
            <label for="imageUrl">Image URL</label>
            <input
              pInputText
              id="imageUrl"
              formControlName="imageUrl"
              placeholder="Enter image URL (optional)"
              fluid />
            <div class="image-preview" *ngIf="productForm.get('imageUrl')?.value">
              <img
                [src]="productForm.get('imageUrl')?.value"
                alt="Product preview"
                class="preview-img" />
            </div>
          </div>

        </div>

        <!-- Actions -->
        <div class="form-actions">
          <p-button
            type="button"
            label="Cancel"
            icon="pi pi-times"
            severity="secondary"
            [outlined]="true"
            (onClick)="onCancel()" />
          <p-button
            type="submit"
            [label]="isEditMode ? 'Update Product' : 'Create Product'"
            [icon]="isEditMode ? 'pi pi-check' : 'pi pi-plus'"
            [loading]="loading"
            [disabled]="productForm.invalid" />
        </div>

      </form>
    </ng-template>
  </p-card>
</div>
