 

  <!-- ── Top Navbar ── -->
  <header class="top-navbar">

    <div class="navbar-left">
      <!-- Hamburger toggle -->
      <p-button
        icon="pi pi-bars"
        [text]="true"
        [rounded]="true"
        severity="secondary"
        (onClick)="toggleSidebar()" />

      <!-- App Logo -->
      <div class="app-logo" (click)="navigateTo('/dashboard')">
        <i class="pi pi-prime"></i>
        <span>MyApp</span>
      </div>
    </div>

    <div class="navbar-right">

      <!-- Notification Bell -->
      <div class="nav-icon-btn" (click)="navigateTo('/notifications')">
        <i class="pi pi-bell"></i>
        <span class="nav-badge" *ngIf="unreadCount() > 0">
          {{ unreadCount() }}
        </span>
      </div>

      <!-- Chat -->
      <div class="nav-icon-btn" (click)="navigateTo('/chat')">
        <i class="pi pi-comments"></i>
      </div>

      <!-- User Avatar -->
      <div class="nav-avatar">
        <p-avatar
          label="A"
          shape="circle"
          styleClass="cursor-pointer" />
        <span class="nav-username">Arjun</span>
      </div>

      <!-- Logout -->
      <p-button
        icon="pi pi-sign-out"
        [text]="true"
        [rounded]="true"
        severity="secondary"
        pTooltip="Logout"
        (onClick)="logout()" />

    </div>
  </header>

  <!-- ── Main Body ── -->
  <div class="app-body">

    <!-- ── Sidebar ── -->
    <aside
      class="app-sidebar"
      [class.sidebar-open]="sidebarVisible"
      [class.sidebar-closed]="!sidebarVisible">

      <!-- Sidebar Menu -->
      <nav class="sidebar-nav">

        <div
          *ngFor="let item of menuItems"
          class="nav-item"
          [class.active]="isActive(item.route)"
          (click)="navigateTo(item.route)">

          <i [class]="item.icon"></i>

          <span class="nav-label">{{ item.label }}</span>

          <!-- Badge for notifications -->
          <span
            class="nav-badge-inline"
            *ngIf="item.badge && unreadCount() > 0">
            {{ unreadCount() }}
          </span>

        </div>

      </nav>

      <!-- Sidebar Footer -->
      <div class="sidebar-footer">
        <p-divider />
        <div class="footer-user">
          <p-avatar label="A" shape="circle" size="normal" />
          <div class="footer-user-info" *ngIf="sidebarVisible">
            <span class="footer-name">Arjun Dhatbale</span>
            <span class="footer-role">Administrator</span>
          </div>
        </div>
      </div>

    </aside>

    <!-- ── Page Content ── -->
    <main
      class="app-content"
      [class.content-expanded]="!sidebarVisible"
      [class.content-with-sidebar]="sidebarVisible">

      <router-outlet />

    </main>

  </div>
